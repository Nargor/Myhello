<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nargor - Creative Developer & Designer Portfolio</title>
    <meta name="description" content="Welcome to my interactive portfolio. Discover my work as a creative developer and designer. Click the profile image for an interactive experience.">
    <meta name="keywords" content="portfolio, developer, designer, creative, interactive">
    <meta name="author" content="Nargor">
    <meta name="theme-color" content="#000000">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Nargor - Creative Developer & Designer Portfolio">
    <meta property="og:description" content="Welcome to my interactive portfolio. Discover my work as a creative developer and designer.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://portfolio.nargor.dev">
    <meta property="og:image" content="https://portfolio.nargor.dev/images/profile2.png">
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nargor - Creative Developer & Designer Portfolio">
    <meta name="twitter:description" content="Welcome to my interactive portfolio. Discover my work as a creative developer and designer.">
    <meta name="twitter:image" content="https://portfolio.nargor.dev/images/profile2.png">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://portfolio.nargor.dev">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .profile {
            width: 256px;
            height: 256px;
            background-image: url('images/profile2.png');
            background-size: 150%;
            background-position: 43% 20%;
            background-repeat: no-repeat;
            border-radius: 100%;
            cursor: pointer;
        }


    </style>
</head>

<body>
    <main class="w-screen h-screen flex flex-col justify-center items-center">
        <section class="flex flex-col items-center">
            <figure class="profile" role="img" aria-label="Nargor's interactive profile image">

            </figure>

            <h1 class="text-2xl txt">มีไยหยอ???</h1>
        </section>
    </main>
    <script>
        function getRandomArbitrary(min, max) {
            return Math.random() * (max - min) + min;
        }
        const profile = document.querySelector(".profile");
        profile.addEventListener("mouseover", () => {
            profile.style.backgroundSize = `${getRandomArbitrary(50, 200)}%`;
            profile.style.backgroundPosition = "43% 20%";
            profile.style.rotate = `${getRandomArbitrary(-360, 360)}deg`;
        });
        profile.addEventListener("mouseout", () => {
            profile.style.backgroundSize = "150%";
            profile.style.backgroundPosition = "43% 20%";
            profile.style.rotate = "0deg";
        });
         profile.addEventListener("click", () => {
          window.open("https://portfolio.nargor.dev", "_blank");
        });
        const text = ["มีไยหยอ???", "ดีฮาฟฟฟุ", "แอ๊ะมีคนแอบส่อง", "อุ๊ยยยยย", "อิอิ", "ผมหล่อไมฮาฟฟฟฟฟุ"];
        setInterval(() => {
            document.querySelector(".txt").textContent = text[Math.floor(getRandomArbitrary(0, text.length - 1))];
        }, 3000);
    </script>
</body>

</html>
