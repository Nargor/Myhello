<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .profile {
            width: 256px;
            height: 256px;
            background-image: url('images/profile2.png');
            background-size: 150%;
            background-position: 43% 20%;
            background-repeat: no-repeat;
            border-radius: 100%;
        }

        /* .profile:hover{
    background-size: 160%;
    background-position: 43% 20%;
    rotate: 10deg;
} */
    </style>
</head>

<body>
    <div class="w-screen h-screen flex flex-col justify-center items-center">
        <div class=" flex flex-col items-center ">
            <div class="profile">

            </div>

            <h1 class="text-2xl txt">มีไยหยอ???</h1>
        </div>
    </div>
    <script>
        function getRandomArbitrary(min, max) {
            return Math.random() * (max - min) + min;
        }
        const profile = document.querySelector(".profile");
        profile.addEventListener("mouseover", () => {
            profile.style.backgroundSize = `${getRandomArbitrary(50, 200)}%`;
            profile.style.backgroundPosition = "43% 20%";
            profile.style.rotate = `${getRandomArbitrary(-10, 360)}deg`;
        });
        profile.addEventListener("mouseout", () => {
            profile.style.backgroundSize = "150%";
            profile.style.backgroundPosition = "43% 20%";
            profile.style.rotate = "0deg";
        });
        const text = ["มีไยหยอ???", "ดีฮาฟฟฟุ", "แอ๊ะมีคนแอบส่อง", "อุ๊ยยยยย", "อิอิ", "ผมหล่อไมฮาฟฟฟฟฟุ"];
        setInterval(() => {
            document.querySelector(".txt").textContent = text[Math.floor(Math.random() * text.length)]
        }, 3000)
    </script>
</body>

</html>
